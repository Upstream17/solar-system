const MOON = {

  distance:2.5, size:0.27, orbit:27.3, rotation:27.3,

/* ============================================================
   2. 场景搭建
   ============================================================ */
const app = document.getElementById('app');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000007);

const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 5000);
camera.position.set(0, 50, 90);

/* 自建太阳辉光 (多 Sprite additive 叠层, 替代 UnrealBloomPass) */
const sunGlowSprites = [];
function makeGlowSprite(color, scale, opacity) {
  const c = document.createElement('canvas'); c.width = c.height = 256;
  const ctx = c.getContext('2d');
  const grad = ctx.createRadialGradient(128,128,0, 128,128,128);
  grad.addColorStop(0.0, color);
  grad.addColorStop(0.4, color.replace(/[\d.]+\)$/, '0.4)'));
  grad.addColorStop(1.0, color.replace(/[\d.]+\)$/, '0)'));
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,256,256);
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  const mat = new THREE.SpriteMaterial({
    map: tex, transparent: true, opacity, depthWrite: false,
    blending: THREE.AdditiveBlending
  });
  const s = new THREE.Sprite(mat);
  s.scale.set(scale, scale, 1);
  return s;
}

const renderer = new THREE.WebGLRenderer({ antialias:true, powerPreference:'high-performance' });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
app.appendChild(renderer.domElement);

/* OrbitControls */
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 4;
controls.maxDistance = 2000;
controls.target.set(0,0,0);

/* 光照 — 增强环境光使暗面可见 + 太阳直射光加强 */
scene.add(new THREE.AmbientLight(0x606088, 0.75));
const sunLight = new THREE.PointLight(0xffffff, 3.5, 0, 1.0);
sunLight.position.set(0,0,0);
scene.add(sunLight);

/* ============================================================
   3. 星空背景 (procedural + 闪烁)
   ============================================================ */
function makeStars(count, radius, sizeRange) {
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count*3);
  const col = new Float32Array(count*3);
  for (let i=0;i<count;i++) {
    const r = radius + Math.random()*2000;
    const theta = Math.acos(2*Math.random()-1);
    const phi = Math.random()*Math.PI*2;
    pos[i*3]   = r*Math.sin(theta)*Math.cos(phi);
    pos[i*3+1] = r*Math.sin(theta)*Math.sin(phi);
    pos[i*3+2] = r*Math.cos(theta);
    const b = 0.7 + Math.random()*0.3;
    // 略带蓝/黄/白变化
    const tint = Math.random();
    col[i*3]   = b * (tint<0.7?1:1.0);
    col[i*3+1] = b * (tint<0.85?1:0.9);
    col[i*3+2] = b * (tint<0.95?1:0.8);
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
  geo.setAttribute('color',    new THREE.BufferAttribute(col,3));
  const mat = new THREE.PointsMaterial({
    size: sizeRange, sizeAttenuation:true, vertexColors:true,
    transparent:true, opacity:0.95, depthWrite:false
  });
  return new THREE.Points(geo, mat);
}
const stars = makeStars(8000, 200, 1.6);
scene.add(stars);

/* ============================================================
   4. 加载器 (含 fallback: 在线纹理失败 → 程序化贴图)
   ============================================================ */
const texLoader = new THREE.TextureLoader();
texLoader.crossOrigin = 'anonymous';

function proceduralTexture(color, size=256) {
  // 兜底：当在线纹理加载失败时使用 canvas 程序贴图
  const c = document.createElement('canvas'); c.width=c.height=size;
  const ctx = c.getContext('2d');
  const col = new THREE.Color(color);
  // 噪声叠加
  const img = ctx.createImageData(size,size);
  for (let i=0;i<size*size;i++) {
    const n = (Math.random()-0.5)*40;
    img.data[i*4]   = Math.max(0,Math.min(255,col.r*255+n));
    img.data[i*4+1] = Math.max(0,Math.min(255,col.g*255+n));
    img.data[i*4+2] = Math.max(0,Math.min(255,col.b*255+n));
    img.data[i*4+3] = 255;
  }
  ctx.putImageData(img,0,0);
  // 加一些"陨石坑"
  for (let k=0;k<size/8;k++){
    ctx.beginPath();
    ctx.arc(Math.random()*size, Math.random()*size, Math.random()*size/15+2, 0, Math.PI*2);
    ctx.fillStyle = `rgba(0,0,0,${Math.random()*0.15})`;
    ctx.fill();
  }
  const t = new THREE.CanvasTexture(c);
  t.colorSpace = THREE.SRGBColorSpace;
  return t;
}

function safeTexture(url, fallbackColor) {
  return new Promise((resolve)=>{
    texLoader.load(
      url,
      (tex)=>{ tex.colorSpace = THREE.SRGBColorSpace; resolve(tex); },
      undefined,
      ()=>{ resolve(proceduralTexture(fallbackColor)); console.warn('fallback for', url); }
    );
  });
}

/* ============================================================
   5. 太阳 (带电晕/光球层)

async function makeSun() {
  const sunTex = await safeTexture('https://threejs.org/examples/textures/planets/sun.jpg', 0xffcc55);
  const geo = new THREE.SphereGeometry(SUN_RADIUS, 64, 64);
  const mat = new THREE.MeshBasicMaterial({ map: sunTex });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.userData = { isSun:true, name:'太阳' };
  scene.add(mesh);

  // 多层 additive 光晕 (替代 UnrealBloomPass)
  const glow1 = makeGlowSprite('rgba(255,200,80,1.0)',  SUN_RADIUS*3.2, 0.85);
  const glow2 = makeGlowSprite('rgba(255,160,40,1.0)',  SUN_RADIUS*5.5, 0.55);
  const glow3 = makeGlowSprite('rgba(255,120,30,1.0)',  SUN_RADIUS*9.0, 0.30);
  mesh.add(glow1); mesh.add(glow2); mesh.add(glow3);
  sunGlowSprites.push(glow1, glow2, glow3);

  // 标签
  addLabel(mesh, '☀ 太阳');
  return mesh;
}

/* ============================================================
   6. 行星 (含轨道线 + 真实轴倾)
   ============================================================ */
async function makePlanet(p) {
  const tex = await safeTexture(p.texture, p.color);
  const geo = new THREE.SphereGeometry(p.size, 48, 48);
  const mat = new THREE.MeshStandardMaterial({ map:tex, roughness:0.85, metalness:0.05,
    emissive: new THREE.Color(p.color).multiplyScalar(0.12), emissiveIntensity: 0.3 });
  if (p.bumpMap) {
    const bump = await safeTexture(p.bumpMap, 0x808080);
    mat.bumpMap = bump;
    mat.bumpScale = 0.04;
  }
  // 注: 移除 specularMap — 在程序化 fallback + 一些浏览器组合下
  //     会触发 MeshStandardMaterial uniforms 同步 bug
  //     (three.module.js refreshUniformsCommon 中 uniforms.specularMap.value undefined)
  //     视觉损失很小, 稳定性大幅提升
  const mesh = new THREE.Mesh(geo, mat);
  mesh.userData = { isPlanet:true, data:p, name:p.name };

  // 倾斜容器 → 公转轨道 + 自转轴
  const pivot = new THREE.Object3D();  // 公转
  const tilt = new THREE.Object3D();   // 自转轴倾角
  tilt.rotation.z = THREE.MathUtils.degToRad(p.tilt);
  mesh.rotation.y = Math.random()*Math.PI*2;
  tilt.add(mesh);
  pivot.add(tilt);

  // 起始位置
  const a = p.distance, e = p.eccentricity || 0;
  const theta0 = Math.random()*Math.PI*2;
  // 简化：忽略真实近日点偏移，仅放圆上
  pivot.position.set(Math.cos(theta0)*a, 0, Math.sin(theta0)*a);
  scene.add(pivot);

  // 土星环等
  if (p.ring) {
    const ringGeo = new THREE.RingGeometry(p.size*1.4, p.size*(p.ringOuter||2.2), 96);
    // UV 修正
    const pos = ringGeo.attributes.position;
    const uv = ringGeo.attributes.uv;
    for (let i=0;i<pos.count;i++){
      const x = pos.getX(i), y = pos.getY(i);
      uv.setXY(i, (Math.sqrt(x*x+y*y) - p.size*1.4) / (p.size*((p.ringOuter||2.2)-1.4)), 0.5);
    }
    const ringMat = new THREE.MeshBasicMaterial({
      color:p.ringColor||0xc9b896, side:THREE.DoubleSide, transparent:true, opacity:0.75
    });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = Math.PI/2;
    mesh.add(ring);
  }

  addLabel(mesh, p.name);
  return { pivot, mesh, data:p };
}

/* ============================================================
   7. 月球 (绕地球)
   ============================================================ */
async function makeMoon() {
  const tex = await safeTexture(MOON.texture, 0xaaaaaa);
  const geo = new THREE.SphereGeometry(MOON.size, 32, 32);
  const mat = new THREE.MeshStandardMaterial({ map:tex, roughness:1,
    emissive: new THREE.Color(0xaaaaaa).multiplyScalar(0.06), emissiveIntensity: 0.2 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.userData = { isPlanet:true, data:MOON, name:MOON.name };

  const pivot = new THREE.Object3D();
  pivot.add(mesh);
  mesh.position.set(MOON.distance, 0, 0);
  return { pivot, mesh, data:MOON };
}

/* 文字标签 (CSS2D 等价 → 用 sprite 更轻) */
function makeTextSprite(text, color='#9bd0ff') {
  const c = document.createElement('canvas');
  c.width = 256; c.height = 64;
  const ctx = c.getContext('2d');
  ctx.font = 'bold 28px sans-serif';
  ctx.fillStyle = color;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = '#000';
  ctx.shadowBlur = 6;
  ctx.fillText(text, 128, 32);
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  const mat = new THREE.SpriteMaterial({ map:tex, transparent:true, depthTest:false });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(6, 1.5, 1);
  sprite.userData.isLabel = true;
  return sprite;
}

function addLabel(parent, text) {
  const s = makeTextSprite(text);
  s.position.set(0, parent.geometry? parent.geometry.parameters.radius*1.6 : 2, 0);
  parent.add(s);
}

/* 轨道线 */
function makeOrbit(distance) {
  const seg = 256;
  const pts = [];
  for (let i=0;i<=seg;i++){
    const a = (i/seg)*Math.PI*2;
    pts.push(new THREE.Vector3(Math.cos(a)*distance, 0, Math.sin(a)*distance));
  }
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  const mat = new THREE.LineBasicMaterial({ color:0x335577, transparent:true, opacity:0.45 });
  const line = new THREE.LineLoop(geo, mat);
  line.userData.isOrbit = true;
  return line;
}

/* ============================================================
   8. 初始化 (异步, 错误隔离)
   ============================================================ */
async function init() {
  try {
    const sun = await makeSun();
    window.__sun = sun;
    const planetObjs = [];
    for (const p of PLANETS) {
      try {
        const obj = await makePlanet(p);
        planetObjs.push(obj);
        scene.add(makeOrbit(p.distance));
      } catch (e) { console.error('planet failed:', p.name, e); }
    }
    let moonObj;
    try {
      moonObj = await makeMoon();
      const earth = planetObjs[2];
      earth.mesh.add(moonObj.pivot);
    } catch (e) { console.error('moon failed:', e); }

    scene.add(makeOrbit(SUN_RADIUS*1.5));

    // 暴露给外层 (主循环、UI 共用)
    window.__sun = sun;
    window.__planets = planetObjs;
    window.__moon = moonObj;

    // 应用非真实比例 (默认), 重新生成轨道线在拉远后的位置
    scaleScene();

    // 启动主循环 (传入引用)
    startMainLoop(planetObjs, moonObj, sun);
  } catch (e) {
    console.error('[INIT ERROR]', e);
    window.__initErr = e;
    document.body.insertAdjacentHTML('afterbegin',
      `<div style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#f55;font-family:monospace;background:#000a;padding:20px;border-radius:8px;z-index:9999;">
        初始化失败: ${e.message}<br>请按 F12 查看 Console
      </div>`);
  }
}

/* scaleScene / regenerateOrbits / realistic 在模块顶层定义,
   这样 init() 在 startMainLoop 调用前就能用 */
const _orbitLines = [];
let realistic = false;
function regenerateOrbits(){
  _orbitLines.forEach(l=>{ scene.remove(l); l.geometry.dispose(); });
  _orbitLines.length = 0;
  const planetObjs = window.__planets;
  if (!planetObjs) return;
  planetObjs.forEach(o=>{
    const p = o.data;
    const r = p.distance * (realistic?1:4.5);
    const line = makeOrbit(r);
    scene.add(line);
    _orbitLines.push(line);
  });
}
function scaleScene(){
  const planetObjs = window.__planets;
  const sun = window.__sun;
  if (!planetObjs) return;
  // 真实比例: 天体按真实相对大小, 距离按真实 AU; 非真实: 所有行星放大 + 距离拉远 4.5x
  const factor = realistic ? 1 : 4.5;
  planetObjs.forEach((o,i)=>{
    const p = o.data;
    if (realistic){
      // 真实比例: 保持相对大小, 但给每个天体一个最小可见尺寸 (0.5 单位)
      const minVisible = 0.5;
      const size = Math.max(p.size, minVisible);
      o.mesh.scale.setScalar(size / p.size);  // 等比放大到 minVisible
      o.pivot.position.setLength(p.distance);
    } else {
      o.mesh.scale.setScalar(0.35);
      o.pivot.position.setLength(p.distance * 4.5);
    }
  });
  if (!realistic){
    sun.scale.setScalar(0.5);
  } else {
    sun.scale.setScalar(1);
  }
  // 切换时自适应相机距离, 确保不会被埋在行星堆里或飞太远
  const maxDist = realistic ? 30.05 * 14 : 30.05 * 14 * 4.5;
  const camDist = camera.position.distanceTo(controls.target);
  if (camDist < 5) {
    // 非真实→真实: 可能太近了, 拉远
    camera.position.set(0, 80, realistic ? 180 : 90);
    controls.target.set(0,0,0);
  } else if (realistic && camDist > 1500) {
    // 真实比例下不要飞太远
    camera.position.set(0, 80, 180);
    controls.target.set(0,0,0);
  }
  regenerateOrbits();
}

function startMainLoop(planetObjs, moonObj, sun) {

/* ============================================================
   9. UI 交互
   ============================================================ */
const speedBtns = document.querySelectorAll('.speed-row button');
const speedLabel = document.getElementById('speed-label');
let speedFactor = 1;

speedBtns.forEach(b=>{
  b.onclick = ()=>{
    speedBtns.forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    speedFactor = +b.dataset.speed;
    speedLabel.textContent = speedFactor===0?'暂停':speedFactor+'×';
  };
});

const $ = id => document.getElementById(id);
const toggleOrbits   = $('toggle-orbits');
const toggleLabels   = $('toggle-labels');
const toggleStars    = $('toggle-stars');
const toggleBloom    = $('toggle-bloom');
const toggleRealistic= $('toggle-realistic');

let _realisticLocal = realistic;  // 引用模块作用域的 realistic
toggleRealistic.onchange = ()=>{
  realistic = toggleRealistic.checked;
  scaleScene();
};

toggleOrbits.onchange = ()=>{
  scene.traverse(o=>{
    if (o.userData?.isOrbit) o.visible = toggleOrbits.checked;
  });
};
toggleLabels.onchange = ()=>{
  scene.traverse(o=>{
    if (o.userData?.isLabel) o.visible = toggleLabels.checked;
  });
};
toggleStars.onchange = ()=>{ stars.visible = toggleStars.checked; };
toggleBloom.onchange = ()=>{
  sunGlowSprites.forEach((s,i)=>{
    s.visible = toggleBloom.checked;
    // 切换时给个轻微呼吸效果
    s.material.opacity = [0.85,0.55,0.30][i] * (toggleBloom.checked?1:0);
  });
};

/* 行星图例 */
const legendList = $('legend-list');
const allClickable = [];
function rebuildClickableList(){
  allClickable.length = 0;
  if (window.__sun) allClickable.push(window.__sun);
  if (window.__planets) window.__planets.forEach(o=>allClickable.push(o.mesh));
  if (window.__moon) allClickable.push(window.__moon.mesh);
}
rebuildClickableList();

allClickable.forEach(m=>{
  const item = document.createElement('div');
  item.className = 'item';
  const color = m.userData.isSun ? '#ffcc55' :
                m.userData.data.color ? '#'+m.userData.data.color.toString(16).padStart(6,'0') : '#aaaaaa';
  item.innerHTML = `<span class="dot" style="background:${color};color:${color}"></span>
    ${m.userData.name}`;
  item.onclick = ()=>{ focusOn(m); };
  legendList.appendChild(item);
});

/* 点击交互 + 实时追踪 */
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let hovered = null;
let trackingTarget = null;  // 当前追踪的 mesh

renderer.domElement.addEventListener('click', (e)=>{
  mouse.x = (e.clientX/innerWidth)*2-1;
  mouse.y = -(e.clientY/innerHeight)*2+1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(allClickable, false);
  if (hits.length) {
    focusOn(hits[0].object);
    trackingTarget = hits[0].object;
    const badge = document.getElementById('tracking-badge');
    document.getElementById('tracking-name').textContent = trackingTarget.userData.name;
    badge.style.display = 'block';
  } else {
    // 点击空白区域 → 取消追踪
    trackingTarget = null;
    document.getElementById('tracking-badge').style.display = 'none';
  }
});
renderer.domElement.addEventListener('mousemove', (e)=>{
  mouse.x = (e.clientX/innerWidth)*2-1;
  mouse.y = -(e.clientY/innerHeight)*2+1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(allClickable, false);
  renderer.domElement.style.cursor = hits.length ? 'pointer' : 'default';
});

function focusOn(mesh) {
  const d = mesh.userData.isSun ? mesh.userData : mesh.userData.data;
  showInfo(d);
  // 飞到该星球
  const wp = mesh.getWorldPosition(new THREE.Vector3());
  const target = wp.clone().add(new THREE.Vector3(d.size*5+5, d.size*3+3, d.size*5+5));
  animateCamera(target, wp);
}

let camAnim = null;
function animateCamera(toPos, toTarget){
  camAnim = {
    fromPos: camera.position.clone(),
    toPos,
    fromTarget: controls.target.clone(),
    toTarget,
    t:0
  };
}

/* ESC 取消追踪 */
addEventListener('keydown', (e)=>{
  if (e.key === 'Escape' && trackingTarget) {
    trackingTarget = null;
    document.getElementById('tracking-badge').style.display = 'none';
  }
});

const infoPanel = $('info-panel');
function showInfo(d){
  $('info-name').textContent = d.name + (d.en?` (${d.en})`:'');
  $('info-type').textContent = d.type || (d.isSun?'恒星 G2V 型':'太阳系天体');
  if (d.facts){
    const grid = $('info-data'); grid.innerHTML='';
    const labels = { diameter:'直径', mass:'质量', day:'自转周期', year:'公转周期',
                     temp:'温度', moons:'卫星数', gravity:'表面重力' };
    Object.entries(d.facts).forEach(([k,v])=>{
      grid.innerHTML += `<div class="k">${labels[k]||k}</div><div class="v">${v}</div>`;
    });
  }
  $('info-fact').innerHTML = d.fact || '';
  infoPanel.classList.add('show');
}
$('info-close').onclick = ()=> infoPanel.classList.remove('show');

/* ============================================================
   10. 主循环
   ============================================================ */
const clock = new THREE.Clock();
const SIM_DAYS_PER_SEC = 5;   // 实时 1 秒 = 5 个地球日 (1× 速度)
let elapsedDays = 0;

function tick(){
  const delta = clock.getDelta() * speedFactor;
  elapsedDays += delta * SIM_DAYS_PER_SEC;

  // 行星公转 + 自转
  planetObjs.forEach(o=>{
    const p = o.data;
    // 公转角速度 (弧度/天)
    const w = (Math.PI*2) / (p.orbit*1);  // p.orbit 单位已是地球日
    const ang = elapsedDays * w;
    const r = p.distance * (realistic?1:4.5);
    o.pivot.position.set(Math.cos(ang)*r, 0, Math.sin(ang)*r);

    // 自转 (考虑正负)
    const ws = (Math.PI*2) / (p.rotation || 1);
    o.mesh.rotation.y += delta * SIM_DAYS_PER_SEC * ws * 0.02;  // 视觉合理速度
  });

  // 月球绕地球
  const wm = (Math.PI*2) / MOON.orbit;
  moonObj.pivot.rotation.y = elapsedDays * wm;
  moonObj.mesh.rotation.y += delta * 0.01;
  moonObj.mesh.position.set(Math.cos(elapsedDays*wm)*MOON.distance, 0,
                            Math.sin(elapsedDays*wm)*MOON.distance);

  // 太阳自转
  sun.rotation.y += delta * 0.05;

  // 星空微旋转 (远景)
  stars.rotation.y += delta * 0.0008;

  // 相机动画
  if (camAnim){
    camAnim.t += delta*1.2;
    const t = Math.min(1, camAnim.t);
    const e = t<.5 ? 2*t*t : -1+(4-2*t)*t;  // easeInOutQuad
    camera.position.lerpVectors(camAnim.fromPos, camAnim.toPos, e);
    controls.target.lerpVectors(camAnim.fromTarget, camAnim.toTarget, e);
    if (t>=1) camAnim = null;
  }

  // 实时追踪 — 相机固定斜后上方跟随目标
  if (trackingTarget) {
    const targetPos = trackingTarget.getWorldPosition(new THREE.Vector3());
    // 选一个星球类型自适应视角距离
    const trackingDist = trackingTarget.userData.isSun ? 20 :
      (trackingTarget.userData.data?.distance || 10) * 0.35;
    const desiredPos = targetPos.clone().add(
      new THREE.Vector3(trackingDist*0.6, trackingDist*0.5, trackingDist*0.7)
    );
    camera.position.lerp(desiredPos, 0.04);
    controls.target.lerp(targetPos, 0.08);
  }

  controls.update();
  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}

/* 自适应 */
addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

tick();  // 🚀 启动主渲染循环

}  // end startMainLoop

/* 启动 */
init();

/* 启动提示 */
console.log('%c🌌 太阳系 3D 探索器已就绪','color:#9bd0ff;font-size:14px;font-weight:bold');
</script>
