<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SOLAR SYSTEM · Three.js</title>

<!-- SpaceX 风字体 + 图标 -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  /* ==========================================================
   * Tokens（颜色 / 间距 / 字体 单一来源 — 改一处全局生效）
   * ========================================================== */
  :root {
    --bg:          #02050a;
    --bg-soft:     #060c18;
    --panel:       rgba(8, 14, 28, 0.72);
    --panel-border:rgba(120, 170, 255, 0.10);
    --text:        #e8edf5;
    --text-mid:    #aab;
    --text-dim:    #5a6478;
    --accent:      #7eb6ff;
    --accent-dim:  #4d8fff;
    --warn:        #ff4747;
    --ok:          #4ade80;

    --font-body:   'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    --font-mono:   'JetBrains Mono', ui-monospace, "SF Mono", Menlo, monospace;

    --radius:      10px;
    --radius-lg:   16px;
    --shadow-glow: 0 0 24px rgba(126,182,255,0.10);
    --ease:        cubic-bezier(0.4, 0, 0.2, 1);
    --t-fast:      150ms;
    --t-norm:      250ms;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  #app { position: fixed; inset: 0; }
  canvas { display: block; }

  /* ==========================================================
   * 通用面板系统 — 所有可折叠面板共享同一套 .panel 样式
   * ========================================================== */
  .panel {
    position: absolute;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: var(--radius);
    backdrop-filter: blur(18px) saturate(140%);
    -webkit-backdrop-filter: blur(18px) saturate(140%);
    box-shadow: var(--shadow-glow);
    transition:
      transform var(--t-norm) var(--ease),
      opacity var(--t-fast) var(--ease);
    z-index: 100;
  }

  /* panel header (可点击折叠) */
  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    cursor: pointer;
    user-select: none;
    color: var(--text-mid);
    font-family: var(--font-mono);
    font-size: 10.5px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    border-bottom: 1px solid transparent;
    transition: color var(--t-fast);
  }
  .panel-header:hover { color: var(--accent); }
  .panel-header .title { display: flex; align-items: center; gap: 8px; }
  .panel-header .title::before {
    content: '';
    display: inline-block;
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }
  .panel-header .chevron {
    transition: transform var(--t-norm) var(--ease);
    opacity: 0.6;
  }
  .panel.collapsed .panel-header .chevron { transform: rotate(-90deg); }
  .panel.collapsed .panel-body { display: none; }

  /* panel body — 内容区 */
  .panel-body {
    padding: 14px;
    overflow: hidden;
  }

  /* 折叠时整个面板变成窄按钮：宽度 = 标题宽度（含 chevron + padding） */
  .panel.collapsed .panel-body { display: none; }

  /* ==========================================================
   * 底部 Dock（控制台 + 图例 + 操作 — 多个 panel 横向排列）
   * ========================================================== */
  #dock {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    align-items: flex-end;
    z-index: 100;
    pointer-events: none;  /* Dock 整体不接收事件，交给子 panel */
  }
  #dock .panel { pointer-events: auto; position: relative; }

  /* Dock 子项高度对齐展开时 = body 自然高度 */
  #dock #panel-controls { min-width: 280px; }
  #dock #panel-legend   { min-width: 200px; max-width: 220px; }

  /* Dock 模式下折叠：只保留 header（细胶囊） */
  .dock-collapsed-flag { display: none; }
  #dock .panel.collapsed {
    width: auto;
    min-width: 0;
  }
  #dock .panel.collapsed .panel-header {
    border-bottom: none;
    padding: 8px 12px;
  }
  #dock .panel.collapsed .panel-header .title::before {
    /* 折叠后只显示小点 */
    width: 6px; height: 6px;
  }

  /* 特别：图例 dock 折叠后只显示 🌌SOLAR 点 */
  #dock #panel-legend.collapsed .panel-header { padding: 8px 14px; }

  /* ==========================================================
   * Info Panel — 右侧抽屉（点击星球时弹出，不在同一 dock）
   * ========================================================== */
  #info-panel {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 320px;
    max-height: calc(100vh - 28px);
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: var(--radius);
    backdrop-filter: blur(18px) saturate(140%);
    -webkit-backdrop-filter: blur(18px) saturate(140%);
    box-shadow: var(--shadow-glow);
    overflow: hidden;
    display: none;
    z-index: 110;
    font-family: var(--font-body);
    animation: slideInR 0.25s var(--ease);
  }
  #info-panel.show { display: block; }
  @keyframes slideInR { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  #info-panel .panel-header { border-bottom: 1px solid var(--panel-border); }
  #info-panel .panel-body { padding: 16px; max-height: calc(100vh - 80px); overflow-y: auto; }
  #info-panel h2 {
    margin: 0 0 2px 0;
    font-family: var(--font-mono);
    font-size: 22px;
    font-weight: 400;
    letter-spacing: 4px;
    color: var(--text);
  }
  #info-panel .subtitle {
    color: var(--accent);
    font-size: 10.5px;
    letter-spacing: 2px;
    margin-bottom: 14px;
    font-family: var(--font-mono);
    text-transform: uppercase;
  }
  #info-panel .data-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px 14px;
    margin: 12px 0;
  }
  #info-panel .data-grid .k {
    color: var(--text-dim);
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 2px;
    font-family: var(--font-mono);
  }
  #info-panel .data-grid .v {
    font-size: 13px;
    color: var(--text);
    font-family: var(--font-mono);
    font-variant-numeric: tabular-nums;
  }
  #info-panel .fact {
    margin-top: 14px;
    padding: 12px 14px;
    border-left: 2px solid var(--accent);
    background: rgba(126, 182, 255, 0.04);
    font-size: 12.5px;
    line-height: 1.65;
    color: var(--text-mid);
    border-radius: 0 4px 4px 0;
  }
  #info-panel .fact b { color: var(--accent); font-weight: 500; }

  /* ==========================================================
   * Tracking 浮条 — 左下角（不在 dock 也不在 title bar）
   * ========================================================== */
  #tracking-badge {
    position: absolute;
    bottom: 14px;
    left: 14px;
    display: none;
    align-items: center;
    gap: 12px;
    padding: 10px 8px 10px 16px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: var(--radius);
    backdrop-filter: blur(18px) saturate(140%);
    -webkit-backdrop-filter: blur(18px) saturate(140%);
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--accent);
    z-index: 100;
    box-shadow: var(--shadow-glow);
  }
  #tracking-badge.show { display: inline-flex; }
  #tracking-badge .pulse {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.5; transform: scale(0.8); }
  }
  #tracking-badge .target-name { color: var(--text); margin: 0 6px; }
  #tracking-badge .esc-hint { color: var(--text-dim); font-size: 9.5px; }
  #tracking-badge .stop-btn {
    background: transparent;
    border: 1px solid rgba(255, 71, 71, 0.4);
    color: #ff8888;
    border-radius: 4px;
    padding: 4px 10px;
    font-size: 10.5px;
    letter-spacing: 1.5px;
    cursor: pointer;
    font-family: var(--font-mono);
    transition: all var(--t-fast);
  }
  #tracking-badge .stop-btn:hover {
    background: rgba(255, 71, 71, 0.15);
    color: #ffaaaa;
    border-color: rgba(255, 71, 71, 0.6);
  }

  /* ==========================================================
   * 控件样式 — input range / checkbox / 数字标签
   * ========================================================== */
  .ctrl-row {
    margin: 12px 0;
  }
  .ctrl-row:first-child { margin-top: 0; }
  .ctrl-row:last-child  { margin-bottom: 0; }

  .ctrl-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 6px;
  }
  .ctrl-label {
    color: var(--text-mid);
    font-size: 10.5px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: var(--font-mono);
  }
  .ctrl-value {
    color: var(--accent);
    font-family: var(--font-mono);
    font-variant-numeric: tabular-nums;
    font-size: 13px;
    font-weight: 400;
  }

  /* slider — 重写 */
  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 2px;
    background: rgba(255, 255, 255, 0.08);
    border-radius: 1px;
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px rgba(126,182,255,0.6);
    cursor: pointer;
    transition: transform var(--t-fast);
  }
  input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }
  input[type=range]::-moz-range-thumb {
    width: 12px; height: 12px; border: none; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px rgba(126,182,255,0.6);
    cursor: pointer;
  }

  /* checkbox — toggle 风格 */
  .toggle-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    cursor: pointer;
  }
  .toggle-row .toggle-label {
    color: var(--text-mid);
    font-size: 10.5px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: var(--font-mono);
  }
  .toggle-row input { display: none; }
  .toggle-row .switch {
    position: relative;
    width: 32px; height: 16px;
    background: rgba(255,255,255,0.08);
    border-radius: 8px;
    transition: background var(--t-fast);
  }
  .toggle-row .switch::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 12px; height: 12px;
    background: var(--text-dim);
    border-radius: 50%;
    transition: all var(--t-fast) var(--ease);
  }
  .toggle-row input:checked + .switch { background: rgba(126, 182, 255, 0.25); }
  .toggle-row input:checked + .switch::after {
    left: 18px;
    background: var(--accent);
    box-shadow: 0 0 6px rgba(126,182,255,0.6);
  }

  .divider { height: 1px; background: var(--panel-border); margin: 12px 0; }

  .footnote {
    margin-top: 12px;
    font-size: 9.5px;
    color: var(--text-dim);
    letter-spacing: 1px;
    font-family: var(--font-mono);
    text-align: center;
    text-transform: uppercase;
  }

  /* ==========================================================
   * 图例
   * ========================================================== */
  #legend-list {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  #legend-list .item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 8px;
    border-radius: 4px;
    cursor: pointer;
    transition: background var(--t-fast);
  }
  #legend-list .item:hover { background: rgba(126, 182, 255, 0.08); }
  #legend-list .item.tracking {
    background: rgba(126, 182, 255, 0.12);
    border-left: 2px solid var(--accent);
    padding-left: 6px;
  }
  #legend-list .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    box-shadow: 0 0 6px currentColor;
    flex-shrink: 0;
  }
  #legend-list .name {
    font-family: var(--font-mono);
    font-size: 11.5px;
    letter-spacing: 1px;
    color: var(--text);
    flex: 1;
  }
  #legend-list .au {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
  }

  /* ==========================================================
   * Dock 内部的 Hint（操作提示）
   * ========================================================== */
  #hint {
    font-family: var(--font-mono);
    font-size: 9.5px;
    letter-spacing: 1.5px;
    line-height: 1.8;
    color: var(--text-dim);
    padding: 12px;
    max-width: 240px;
    min-width: 200px;
  }
  #hint .k { color: var(--accent); }
  #hint .v { color: var(--text-mid); }

  /* ==========================================================
   * 移动端 (< 768px)
   * ========================================================== */
  @media (max-width: 768px) {
    #dock {
      bottom: 0;
      left: 0;
      transform: none;
      width: 100%;
      flex-direction: column;
      gap: 1px;
      align-items: stretch;
    }
    #dock .panel {
      width: 100% !important;
      min-width: 0 !important;
      max-width: none !important;
      border-radius: 0;
      border-left: none;
      border-right: none;
    }
    #dock .panel:last-child { border-bottom: none; }

    #info-panel {
      top: auto;
      bottom: 0;
      right: 0;
      left: 0;
      width: 100%;
      max-height: 60vh;
      border-radius: 14px 14px 0 0;
    }

    #tracking-badge {
      bottom: auto;
      top: 14px;
      left: 14px;
    }
  }

  /* 滚动条 — SpaceX 风细线 */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.12); }
</style>
</head>
<body>

<div id="app"></div>

<!-- ============================================================
     底部 Dock — 多 panel 横向排列，统一从底部中心对齐
     ============================================================ -->
<div id="dock">

  <!-- 操作提示（折叠：只剩 header） -->
  <section class="panel" id="panel-hint">
    <div class="panel-header" data-collapse-btn>
      <span class="title">Controls</span>
      <svg class="chevron" width="10" height="10" viewBox="0 0 10 10" fill="none">
        <path d="M2 4l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="panel-body" data-collapse-body>
      <div id="hint">
        <span class="k">DRAG</span> <span class="v">左键旋转视角</span><br>
        <span class="k">PAN</span> <span class="v">右键平移</span><br>
        <span class="k">ZOOM</span> <span class="v">滚轮缩放</span><br>
        <span class="k">CLICK</span> <span class="v">点击星球 / 图例</span><br>
        <span class="k">ESC</span> <span class="v">退出追踪</span>
      </div>
    </div>
  </section>

  <!-- 控制台 -->
  <section class="panel" id="panel-controls" data-collapse>
    <div class="panel-header" data-collapse-btn>
      <span class="title">Mission Control</span>
      <svg class="chevron" width="10" height="10" viewBox="0 0 10 10" fill="none">
        <path d="M2 4l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="panel-body">

      <!-- 时间流速 -->
      <div class="ctrl-row">
        <div class="ctrl-head">
          <span class="ctrl-label">TIME · 时间流速</span>
          <span class="ctrl-value" id="speed-label">1.0×</span>
        </div>
        <input type="range" id="speed-slider" min="0" max="100" value="50" step="0.5">
      </div>

      <!-- 太阳亮度 -->
      <div class="ctrl-row">
        <div class="ctrl-head">
          <span class="ctrl-label">LUMINANCE · 太阳亮度</span>
          <span class="ctrl-value" id="brightness-label">1.5</span>
        </div>
        <input type="range" id="brightness-slider" min="0.5" max="8" value="1.5" step="0.1">
      </div>

      <div class="divider"></div>

      <!-- toggle 开关 -->
      <label class="toggle-row">
        <span class="toggle-label">显示轨道</span>
        <input type="checkbox" id="toggle-orbits" checked>
        <span class="switch"></span>
      </label>
      <label class="toggle-row">
        <span class="toggle-label">显示星标</span>
        <input type="checkbox" id="toggle-labels" checked>
        <span class="switch"></span>
      </label>
      <label class="toggle-row">
        <span class="toggle-label">星空背景</span>
        <input type="checkbox" id="toggle-stars" checked>
        <span class="switch"></span>
      </label>
      <label class="toggle-row">
        <span class="toggle-label">地球云层</span>
        <input type="checkbox" id="toggle-clouds" checked>
        <span class="switch"></span>
      </label>
      <label class="toggle-row">
        <span class="toggle-label">太阳辉光</span>
        <input type="checkbox" id="toggle-bloom" checked>
        <span class="switch"></span>
      </label>

      <div class="divider"></div>

      <!-- 星光密度 -->
      <div class="ctrl-row">
        <div class="ctrl-head">
          <span class="ctrl-label">STAR DENSITY</span>
          <span class="ctrl-value" id="stars-density-label">100%</span>
        </div>
        <input type="range" id="stars-density-slider" min="0" max="100" value="100" step="5">
      </div>

      <div class="footnote">AU 真实 · 体积艺术夸张</div>
    </div>
  </section>

  <!-- 行星图例 -->
  <section class="panel" id="panel-legend" data-collapse>
    <div class="panel-header" data-collapse-btn>
      <span class="title">Bodies</span>
      <svg class="chevron" width="10" height="10" viewBox="0 0 10 10" fill="none">
        <path d="M2 4l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="panel-body">
      <div id="legend-list"></div>
    </div>
  </section>
</div>

<!-- 追踪浮条（左下角） -->
<div id="tracking-badge">
  <span class="pulse"></span>
  <span>TRACKING</span>
  <span class="target-name" id="tracking-name">—</span>
  <button class="stop-btn" id="tracking-stop-btn">STOP</button>
  <span class="esc-hint">ESC</span>
</div>

<!-- 星球信息面板（右侧抽屉） -->
<div id="info-panel">
  <div class="panel-header" style="cursor:default;">
    <span class="title" id="info-type">—</span>
    <span class="close" id="info-close" style="opacity:0.6;cursor:pointer;font-family:var(--font-mono);font-size:14px;letter-spacing:2px;">×</span>
  </div>
  <div class="panel-body">
    <h2 id="info-name">—</h2>
    <div class="data-grid" id="info-data"></div>
    <div class="fact" id="info-fact"></div>
  </div>
</div>

<!-- importmap + 全局错误 + 入口 -->
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script>
  window.addEventListener('error', (e) => {
    const err = document.createElement('div');
    err.style.cssText = 'position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); color:#f55; font-family:monospace; background:#000d; padding:24px; border-radius:8px; z-index:99999; max-width:80%; white-space:pre-wrap; border:1px solid #f55;';
    err.innerHTML = '<b>JS 错误：</b><br>' + e.message + '<br><br><b>位置：</b>' + e.filename + ':' + e.lineno + ':' + e.colno;
    document.body.appendChild(err);
  });
  window.addEventListener('unhandledrejection', (e) => {
    const err = document.createElement('div');
    err.style.cssText = 'position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); color:#f55; font-family:monospace; background:#000d; padding:24px; border-radius:8px; z-index:99999; max-width:80%; white-space:pre-wrap; border:1px solid #f55;';
    err.innerHTML = '<b>未捕获的 Promise 错误：</b><br>' + e.reason;
    document.body.appendChild(err);
  });
</script>

<script type="module" src="./src/main.js?v=20260702b"></script>
</body>
</html>
