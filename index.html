<style>

/* ============================================================
   1. 真实天文数据 (NASA fact sheet)
   - size        = 演示模式基准半径（艺术夸张，已含视觉友好）
   - realSize    = 真实半径（地球 = 1.0，NASA 公约）
   - realRadius  = 当前显示半径（演示模式用 size，真实模式用 sqrt(realSize) * 基准 + log 压缩）
   - distance    = 与太阳的距离 (AU)
   ============================================================ */
const AU = 14;

// ===== 演示模式 =====
// 太阳偏小（保证水星不穿模），行星用 data.size（艺术夸张值）
const SUN_DEMO = 1.5;

// ===== 真实模式（power 压缩 + 大小顺序对 — 工业级 demo 做法）=====
// 体积不能既"真实"又"装得下"（太阳≈109×地球，海王星≈30×地球轨道）。
// 折中：power 压缩（EXP=0.4）+ 硬编码水星最小值，保证不穿模
//   太阳 4.0
//   水星 0.5 (硬编码)
//   火星 0.78 / 金星 0.98 / 地球 1.0
//   海王星 1.72 / 天王星 1.74 / 土星 2.46 / 木星 2.63
//   太阳/木星 = 1.52× ✓
//   大小顺序：水星<火星<金星<地球<海王星<天王星<土星<木星<太阳（与真实完全一致 ✓）
// 距离按真实 AU 比例：DIST_SCALE_REAL = 12
const SUN_REAL = 4.0;
const PLANET_POWER_EXP = 0.4;
const DIST_SCALE_REAL = 12;
const SUN_REAL_MAX_PLANET_RATIO = 0.85;  // 最大行星不超过太阳 85%
const MERCURY_MIN_RADIUS = 0.5;          // 水星最小半径（保证不穿模）

/** 真实模式行星半径：realSize^0.4
 *  水星最小 0.5，最大不超过太阳 85%
 */
function realPlanetRadius(realSize, name) {
  if (name === '水星') return MERCURY_MIN_RADIUS;
  const r = Math.pow(realSize, PLANET_POWER_EXP);
  return Math.min(r, SUN_REAL * SUN_REAL_MAX_PLANET_RATIO);
}

const MOON = {
  name:'月球', en:'Moon', parent:'地球',
  distance:2.5, size:0.27, realSize:0.273, diameterKm:3474,
  orbit:27.3, rotation:27.3,
  texture:'https://threejs.org/examples/textures/planets/moon.jpg',
  facts:{ diameter:'3,474 km', mass:'7.35×10²² kg', day:'27.3 地球日', year:'27.3 地球日',

  fact:'<b>月球</b>是地球唯一的天然卫星，约形成于 45 亿年前。<br>它的潮汐作用稳定了地球自转轴。<br>月球正以每年 3.8 cm 的速度远离地球。'
};

/* ============================================================
   2. 场景搭建
   ============================================================ */
const app = document.getElementById('app');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000007);

const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 5000);
camera.position.set(0, 50, 90);

/* 太阳辉光 sprite
   sizeAttenuation:false 让辉光不随相机距离变化（始终保持视觉大小一致） */
function makeGlowSprite(color, scale, opacity) {
  const c = document.createElement('canvas'); c.width = c.height = 256;
  const ctx = c.getContext('2d');
  const grad = ctx.createRadialGradient(128,128,0, 128,128,128);
  grad.addColorStop(0.0, color);
  grad.addColorStop(0.4, color.replace(/[\d.]+\)$/, '0.4)'));
  grad.addColorStop(1.0, color.replace(/[\d.]+\)$/, '0)'));
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,256,256);
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  const mat = new THREE.SpriteMaterial({
    map: tex, transparent: true, opacity, depthWrite: false,
    blending: THREE.AdditiveBlending,
    sizeAttenuation: false  // 不随距离缩放 — 防止远处看太阳像巨大火球
  });
  const s = new THREE.Sprite(mat);
  s.scale.set(scale, scale, 1);
  return s;
}

const renderer = new THREE.WebGLRenderer({ antialias:true, powerPreference:'high-performance' });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
app.appendChild(renderer.domElement);

/* OrbitControls */
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 1.5;
controls.maxDistance = 5000;

function makeStars(count, radius, sizeRange) {
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count*3);
  const col = new Float32Array(count*3);
  for (let i=0;i<count;i++) {
    const r = radius + Math.random()*2000;
    const theta = Math.acos(2*Math.random()-1);
    const phi = Math.random()*Math.PI*2;
    pos[i*3]   = r*Math.sin(theta)*Math.cos(phi);
    pos[i*3+1] = r*Math.sin(theta)*Math.sin(phi);
    pos[i*3+2] = r*Math.cos(theta);
    const b = 0.7 + Math.random()*0.3;
    const tint = Math.random();
    col[i*3]   = b * (tint<0.7?1:1.0);
    col[i*3+1] = b * (tint<0.85?1:0.9);
    col[i*3+2] = b * (tint<0.95?1:0.8);
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
  geo.setAttribute('color',    new THREE.BufferAttribute(col,3));
  const mat = new THREE.PointsMaterial({
    size: sizeRange, sizeAttenuation:true, vertexColors:true,
    transparent:true, opacity:0.95, depthWrite:false
  });
  return new THREE.Points(geo, mat);
}
const stars = makeStars(8000, 200, 1.6);
scene.add(stars);

const texLoader = new THREE.TextureLoader();
texLoader.crossOrigin = 'anonymous';

function proceduralTexture(color, size=256) {
  const c = document.createElement('canvas'); c.width=c.height=size;
  const ctx = c.getContext('2d');
  const col = new THREE.Color(color);
  const img = ctx.createImageData(size,size);
  for (let i=0;i<size*size;i++) {
    const n = (Math.random()-0.5)*40;
    img.data[i*4]   = Math.max(0,Math.min(255,col.r*255+n));
    img.data[i*4+1] = Math.max(0,Math.min(255,col.g*255+n));
    img.data[i*4+2] = Math.max(0,Math.min(255,col.b*255+n));
    img.data[i*4+3] = 255;
  }
  ctx.putImageData(img,0,0);
  for (let k=0;k<size/8;k++){
    ctx.beginPath();
    ctx.arc(Math.random()*size, Math.random()*size, Math.random()*size/15+2, 0, Math.PI*2);
    ctx.fillStyle = `rgba(0,0,0,${Math.random()*0.15})`;
    ctx.fill();
  }
  const t = new THREE.CanvasTexture(c);
  t.colorSpace = THREE.SRGBColorSpace;
  return t;
}

function safeTexture(url, fallbackColor) {
  return new Promise((resolve)=>{
    texLoader.load(
      url,
      (tex)=>{ tex.colorSpace = THREE.SRGBColorSpace; resolve(tex); },
      undefined,
      ()=>{ resolve(proceduralTexture(fallbackColor)); console.warn('fallback for', url); }
    );
  });
}

/* ============================================================
   6. 行星
   ============================================================ */
async function makePlanet(p) {
  const tex = await safeTexture(p.texture, p.color);
  const geo = new THREE.SphereGeometry(p.size, 48, 48);
  const mat = new THREE.MeshStandardMaterial({ map:tex, roughness:0.85, metalness:0.05,
    emissive: new THREE.Color(p.color).multiplyScalar(0.04),
    emissiveIntensity: 0.05  // 极弱自发光：保留质感但晨昏线对比明显
  });
  if (p.bumpMap) {
    const bump = await safeTexture(p.bumpMap, 0x808080);
    mat.bumpMap = bump;
    mat.bumpScale = 0.04;
  }
  const mesh = new THREE.Mesh(geo, mat);
  mesh.userData = { isPlanet:true, data:p, name:p.name };

  const pivot = new THREE.Object3D();
  const tilt = new THREE.Object3D();
  tilt.rotation.z = THREE.MathUtils.degToRad(p.tilt);
  mesh.rotation.y = Math.random()*Math.PI*2;
  tilt.add(mesh);
  pivot.add(tilt);

  const a = p.distance;
  const theta0 = Math.random()*Math.PI*2;
  pivot.position.set(Math.cos(theta0)*a, 0, Math.sin(theta0)*a);
  scene.add(pivot);

  if (p.ring) {
    const ringGeo = new THREE.RingGeometry(p.size*1.4, p.size*(p.ringOuter||2.2), 96);
    const pos = ringGeo.attributes.position;
    const uv = ringGeo.attributes.uv;
    for (let i=0;i<pos.count;i++){
      const x = pos.getX(i), y = pos.getY(i);
      uv.setXY(i, (Math.sqrt(x*x+y*y) - p.size*1.4) / (p.size*((p.ringOuter||2.2)-1.4)), 0.5);
    }
    const ringMat = new THREE.MeshBasicMaterial({
      color:p.ringColor||0xc9b896, side:THREE.DoubleSide, transparent:true, opacity:0.75
    });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = Math.PI/2;
    mesh.add(ring);
  }

  addLabel(mesh, p.name, p.size*1.6);
  return { pivot, mesh, data:p };
}

function makeTextSprite(text, color='#9bd0ff') {
  const c = document.createElement('canvas');
  c.width = 256; c.height = 64;
  const ctx = c.getContext('2d');
  ctx.font = 'bold 28px sans-serif';
  ctx.fillStyle = color;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = '#000';
  ctx.shadowBlur = 6;
  ctx.fillText(text, 128, 32);
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  const mat = new THREE.SpriteMaterial({ map:tex, transparent:true, depthTest:false });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(6, 1.5, 1);
  sprite.userData.isLabel = true;
  return sprite;
}

function addLabel(parent, text, yOffset) {
  const s = makeTextSprite(text);
  s.position.set(0, yOffset || 2, 0);
  parent.add(s);
}

/* 轨道线 */
function makeOrbit(distance) {
  const seg = 256;
  const pts = [];
  for (let i=0;i<=seg;i++){
    const a = (i/seg)*Math.PI*2;
    pts.push(new THREE.Vector3(Math.cos(a)*distance, 0, Math.sin(a)*distance));
  }
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  const mat = new THREE.LineBasicMaterial({ color:0x335577, transparent:true, opacity:0.45 });
  const line = new THREE.LineLoop(geo, mat);
  line.userData.isOrbit = true;
  return line;
}

/* ============================================================
   8. 缩放逻辑 (核心修复 #5)
   ============================================================ */
let realistic = false;
const _orbitLines = [];

/** 演示/真实模式下的尺寸计算
 *  演示模式：data.size（艺术夸张值）
 *  真实模式：realSize^0.4（power 压缩，详见常量定义）
 */
function getPlanetDisplayRadius(p) {
  if (realistic) {
    return realPlanetRadius(p.realSize, p.name);
  } else {
    return p.size;
  }
}
function getSunDisplayRadius() {
  return realistic ? SUN_REAL : SUN_DEMO;
}
function getDisplayDistance(p) {
  if (realistic) {
    // 真实模式：按 AU 比例，水星 0.39AU → 4.68，海王星 30.05AU → 360.6
    return p.distance / AU * DIST_SCALE_REAL;
  } else {
    // 演示模式：水星 0.39*14 = 5.46，乘 0.6 = 3.28，太阳 1.5 → 边距 1.78 ✅
    return p.distance * 0.6;
  }
}

function regenerateOrbits(){
  _orbitLines.forEach(l=>{ scene.remove(l); l.geometry.dispose(); });
  _orbitLines.length = 0;
  const planetObjs = window.__planets;
  if (!planetObjs) return;
  planetObjs.forEach(o=>{
    const line = makeOrbit(getDisplayDistance(o.data));
    scene.add(line);
    _orbitLines.push(line);
  });
}

function scaleScene(){
  const planetObjs = window.__planets;
  const sun = window.__sun;
  if (!planetObjs) return;

  const sunRadius = getSunDisplayRadius();
  // 太阳几何尺寸固定为 SUN_DEMO，scale 调整显示
  sun.scale.setScalar(sunRadius / SUN_DEMO);

  // 辉光尺寸：用相对当前显示太阳半径的小倍数（视觉占比 1.5×~3×）
  const glowScales = [sunRadius*1.5, sunRadius*2.0, sunRadius*2.8];
  sunGlowSprites.forEach((s,i)=> s.scale.set(glowScales[i], glowScales[i], 1));

  // 行星
  planetObjs.forEach(o=>{
    const target = getPlanetDisplayRadius(o.data);
    const base = o.data.size;  // 几何创建时的半径
    o.mesh.scale.setScalar(target / base);
    o.pivot.position.setLength(getDisplayDistance(o.data));
  });

  // 月球大小跟随地球
  const moon = window.__moon;
  if (moon) {
    const earth = planetObjs[2];
    const earthRadius = getPlanetDisplayRadius(earth.data);
    // 真实模式月球 = realSize^0.4；演示模式 = MOON.size
    const moonTarget = realistic ? realPlanetRadius(MOON.realSize, MOON.name)
                                  : MOON.size;
    moon.mesh.scale.setScalar(moonTarget / MOON.size);
    // 月球距离：演示模式保持 MOON.distance 比例；真实模式 = 地球半径 × 6（视觉可见）
    const moonDist = realistic ? earthRadius * 6.0 : MOON.distance * (earthRadius / earth.data.size);
    moon.mesh.position.set(moonDist, 0, 0);
  }

  regenerateOrbits();

  // 切换时智能调整相机（让用户能看到有意义的场景）
  const neptuneDist = getDisplayDistance(PLANETS[PLANETS.length-1]);
  const camDist = camera.position.distanceTo(controls.target);
  if (realistic) {
    // 进入真实模式：相机默认拉到能看见外圈行星（海王星 360），但保留用户手动调节
    // 如果当前相机离太阳 < 海王星轨道 60%，说明还停留在演示模式视角，自动拉远
    if (camDist < neptuneDist * 0.6) {
      camera.position.set(0, neptuneDist*0.4, neptuneDist*0.7);
      controls.target.set(0,0,0);
    }
  } else {
    // 退出真实模式：拉近演示模式视图（看太阳系全貌）
    if (camDist > neptuneDist * 2) {
      camera.position.set(0, 40, 80);
      controls.target.set(0,0,0);
    }
  }
}

   9. 初始化
   ============================================================ */
async function init() {
  try {
    const sun = await makeSun();
    window.__sun = sun;
    const planetObjs = [];
    for (const p of PLANETS) {
      try {
        const obj = await makePlanet(p);
        planetObjs.push(obj);
      } catch (e) { console.error('planet failed:', p.name, e); }
    }
    let moonObj;
    try {
      moonObj = await makeMoon();
      const earth = planetObjs[2];
      earth.mesh.add(moonObj.pivot);
    } catch (e) { console.error('moon failed:', e); }

    scene.add(makeOrbit(SUN_DEMO*1.5));

    window.__sun = sun;
    window.__planets = planetObjs;
    window.__moon = moonObj;

    scaleScene();
    startMainLoop(planetObjs, moonObj, sun);
  } catch (e) {
    console.error('[INIT ERROR]', e);
    document.body.insertAdjacentHTML('afterbegin',
      `<div style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#f55;font-family:monospace;background:#000a;padding:20px;border-radius:8px;z-index:9999;">
        初始化失败: ${e.message}<br>请按 F12 查看 Console
      </div>`);
  }
}

/* ============================================================
   10. 追踪系统 (核心修复 #2/#3/#4)
   ============================================================ */
let trackingTarget = null;
let camAnim = null;

function startTracking(mesh, withFocus=true) {
  trackingTarget = mesh;
  updateTrackingBadge();
  updateLegendHighlight();
  if (withFocus) focusOn(mesh);
}

function stopTracking() {
  if (!trackingTarget) return;
  trackingTarget = null;
  updateTrackingBadge();
  updateLegendHighlight();
}

function updateTrackingBadge() {
  const badge = document.getElementById('tracking-badge');
  if (trackingTarget) {
    document.getElementById('tracking-name').textContent = trackingTarget.userData.name;
    badge.classList.add('show');
  } else {
    badge.classList.remove('show');
  }
}

function updateLegendHighlight() {
  document.querySelectorAll('#legend .item').forEach(el=>{
    if (trackingTarget && el.dataset.name === trackingTarget.userData.name) {
      el.classList.add('tracking');
    } else {
      el.classList.remove('tracking');
    }
  });
}

function focusOn(mesh) {
  // 修复 #1: 兼容太阳（太阳 userData 已有 size 字段，由 makeSun 注入）
  const radius = mesh.userData.isSun
    ? mesh.userData.size
    : mesh.userData.data.size;
  const info = mesh.userData.isSun
    ? mesh.userData
    : mesh.userData.data;
  showInfo(info);

  const wp = mesh.getWorldPosition(new THREE.Vector3());
  // 修复 #1: 用显示半径（考虑真实/演示模式），不是几何半径
  const displayR = mesh.userData.isSun
    ? getSunDisplayRadius()
    : getPlanetDisplayRadius(mesh.userData.data);
  const offset = displayR * 4 + 4;
  const target = wp.clone().add(new THREE.Vector3(offset, offset*0.6, offset));
  animateCamera(target, wp);
}

function animateCamera(toPos, toTarget){
  // 如果正在追踪，先停止追踪（让动画接管），动画结束后恢复追踪
  const wasTracking = trackingTarget;
  camAnim = {
    fromPos: camera.position.clone(),
    toPos,
    fromTarget: controls.target.clone(),
    toTarget,
    t:0,
    resumeTracking: wasTracking  // 动画结束后要不要重新追踪
  };
}

// 时间流速 slider (分段映射: 0-50 线性 0-1×，50-100 对数 1-100×)
const speedSlider = $('speed-slider');
const speedLabel = $('speed-label');
let speedFactor = 1;

function sliderToSpeed(v) {
  // v 0-100
  // v=0    → 0   (暂停)
  // v=25   → 0.1
  // v=50   → 1
  // v=65   → 5
  // v=80   → 30
  // v=100  → 100
  if (v <= 0) return 0;
  if (v <= 50) {
    // 0-50 线性: 0 → 1
    return v / 50;
  } else {
    // 50-100 对数: 1 → 100
    // 50→1, 100→100, 即 10^((v-50)/25)
    return Math.pow(10, (v - 50) / 25);
  }
}
function formatSpeed(s) {
  if (s === 0) return '⏸ 暂停';
  if (s < 0.1) return s.toFixed(2) + '×';
  if (s < 1) return s.toFixed(1) + '×';
  if (s < 10) return s.toFixed(1) + '×';
  return Math.round(s) + '×';
}
function applySpeed() {
  speedFactor = sliderToSpeed(+speedSlider.value);
  speedLabel.textContent = formatSpeed(speedFactor);
}

function buildLegend() {

  if (window.__planets) items.push(...window.__planets.map(o=>o.mesh));

/* 模拟器点击（修复 #3: 空白处不取消追踪） */
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (e)=>{
  mouse.x = (e.clientX/innerWidth)*2-1;
  mouse.y = -(e.clientY/innerHeight)*2+1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(allClickable, false);
  if (hits.length) {
    const m = hits[0].object;
    if (trackingTarget === m) {
      stopTracking();  // 再次点击同一目标 → 停止追踪
    } else {
      startTracking(m, true);
    }
  }
  // 修复 #3: 空白处不再取消追踪
  // 但如果用户拖拽了视角（OrbitControls），不应该触发此 click
  // OrbitControls 已处理 mousedown/mousemove 检测，但这里我们靠后续检测
});

renderer.domElement.addEventListener('mousemove', (e)=>{
  mouse.x = (e.clientX/innerWidth)*2-1;
  mouse.y = -(e.clientY/innerHeight)*2+1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(allClickable, false);
  renderer.domElement.style.cursor = hits.length ? 'pointer' : 'default';
});

    const grid = $('info-data'); grid.innerHTML='';
    const labels = { diameter:'直径', mass:'质量', day:'自转周期', year:'公转周期',
                     temp:'温度', moons:'卫星数', gravity:'表面重力', age:'年龄', luminosity:'光度' };
    Object.entries(d.facts).forEach(([k,v])=>{
      grid.innerHTML += `<div class="k">${labels[k]||k}</div><div class="v">${v}</div>`;
    });
  }
  $('info-fact').innerHTML = d.fact || '';
  infoPanel.classList.add('show');
}
$('info-close').addEventListener('click', ()=> infoPanel.classList.remove('show'));

/* ============================================================
   12. 主循环
   ============================================================ */
const clock = new THREE.Clock();
const SIM_DAYS_PER_SEC = 5;
let elapsedDays = 0;

function tick(){
  // deltaReal: 真实经过时间（相机动画、星空旋转用这个，跟 speedFactor 无关）
  // deltaSim:  模拟时间（受 speedFactor 影响，用于天体力学）
  const deltaReal = clock.getDelta();
  const deltaSim  = deltaReal * speedFactor;
  elapsedDays += deltaSim * SIM_DAYS_PER_SEC;

  // 行星公转 + 自转（受 speedFactor 影响）
  if (window.__planets) {
    window.__planets.forEach(o=>{
      const p = o.data;
      const w = (Math.PI*2) / p.orbit;
      const ang = elapsedDays * w;
      o.pivot.position.set(Math.cos(ang)*getDisplayDistance(p), 0, Math.sin(ang)*getDisplayDistance(p));
      const ws = (Math.PI*2) / (p.rotation || 1);
      o.mesh.rotation.y += deltaSim * SIM_DAYS_PER_SEC * ws * 0.02;
    });
  }

  // 月球（受 speedFactor 影响）
  const moon = window.__moon;
  if (moon && window.__planets) {
    const wm = (Math.PI*2) / MOON.orbit;
    moon.pivot.rotation.y = elapsedDays * wm;
    moon.mesh.rotation.y += deltaSim * 0.01;
  }

  // 太阳自转（受 speedFactor 影响 — 跟随时间流速）
  if (window.__sun) window.__sun.rotation.y += deltaSim * 0.05;

  // 星空旋转（不跟 speedFactor —— 用户拖慢时间流速不应让星空冻结）
  stars.rotation.y += deltaReal * 0.0008;

  // 相机动画（用 deltaReal，固定时长 ≈ 0.7 秒，跟 speedFactor 无关）
  if (camAnim){
    camAnim.t += deltaReal * 1.5;  // 1.5 = 1/0.67s
    const t = Math.min(1, camAnim.t);
    const e = t<.5 ? 2*t*t : -1+(4-2*t)*t;
    camera.position.lerpVectors(camAnim.fromPos, camAnim.toPos, e);
    controls.target.lerpVectors(camAnim.fromTarget, camAnim.toTarget, e);
    if (t >= 1) {
      camAnim = null;
    }
  }

  // 追踪（修复 #3/#4: 追踪中可以调节视角，OrbitControls 继续工作）
  if (trackingTarget) {
    // controls.target 锁定到目标，OrbitControls 围绕目标工作（滚轮/拖拽都正常）
    const targetPos = trackingTarget.getWorldPosition(new THREE.Vector3());
    controls.target.lerp(targetPos, 0.1);
    // 注意：相机位置完全由 OrbitControls 管理，不强制拉近/拉远
  }

  controls.update();
  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}

addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/* ============================================================
   13. 启动
   ============================================================ */
function startMainLoop(planetObjs, moonObj, sun) {
  rebuildClickableList();
  buildLegend();
  tick();
}

init();

console.log('%c🌌 太阳系 3D 探索器已就绪','color:#9bd0ff;font-size:14px;font-weight:bold');
</script>
