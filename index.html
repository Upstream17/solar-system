<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🌌 太阳系 3D 探索器 · Three.js</title>
<style>
  html, body { margin:0; padding:0; overflow:hidden; width:100%; height:100%; background:#000; color:#fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; }
  #app { position:fixed; inset:0; }
  canvas { display:block; }

  /* ===== 顶部标题栏 ===== */
  #titlebar {
    position:absolute; top:14px; left:50%; transform:translateX(-50%);
    padding:8px 18px; background:rgba(8,12,30,0.55);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border:1px solid rgba(120,160,255,0.25); border-radius:30px;
    font-size:14px; letter-spacing:2px; pointer-events:none;
    box-shadow:0 0 30px rgba(80,140,255,0.15);
  }
  #titlebar b { color:#9bd0ff; }

  /* ===== 左上控制面板 ===== */
  #controls {
    position:absolute; top:70px; left:14px; padding:12px 14px;
    background:rgba(8,12,30,0.55); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border:1px solid rgba(120,160,255,0.2); border-radius:12px;
    font-size:12.5px; min-width:240px; line-height:1.8;
    box-shadow:0 0 25px rgba(80,140,255,0.1);
  }
  #controls h3 { margin:0 0 8px 0; font-size:13px; color:#9bd0ff; letter-spacing:1px;
    border-bottom:1px solid rgba(120,160,255,0.2); padding-bottom:6px;}
  #controls label { display:flex; justify-content:space-between; align-items:center; cursor:pointer; }
  #controls label:hover { color:#9bd0ff; }
  #controls input[type=range] { width:100%; accent-color:#9bd0ff; cursor:pointer; }
  #controls input[type=checkbox] { accent-color:#9bd0ff; cursor:pointer; }
  #controls .slider-row { margin: 8px 0; }
  #controls .slider-row .slider-head {
    display:flex; justify-content:space-between; align-items:center;
    font-size:11.5px; color:#aac; margin-bottom:3px;
  }
  #controls .slider-row .slider-head b { color:#9bd0ff; font-weight:normal; }
  .speed-ticks {
    display:flex; justify-content:space-between; font-size:9.5px; color:#668;
    margin-top:2px; padding:0 2px;
  }

  /* ===== 右下行星图例 ===== */
  #legend {
    position:absolute; bottom:14px; right:14px; padding:10px 12px;
    background:rgba(8,12,30,0.55); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border:1px solid rgba(120,160,255,0.2); border-radius:12px;
    font-size:12px; max-width:220px; line-height:1.7;
  }
  #legend h4 { margin:0 0 6px 0; font-size:12px; color:#9bd0ff; letter-spacing:1px; }
  #legend .item { display:flex; align-items:center; gap:6px; cursor:pointer; padding:1px 4px; border-radius:4px; }
  #legend .item:hover { background:rgba(155,208,255,0.15); }
  #legend .item.tracking { background:rgba(155,208,255,0.28); border-left:2px solid #9bd0ff; padding-left:2px; }
  #legend .dot { width:10px; height:10px; border-radius:50%; box-shadow:0 0 6px currentColor;}

  /* ===== 星球信息面板 ===== */
  #info-panel {
    position:absolute; top:70px; right:14px; width:290px; max-height:78vh; overflow-y:auto;
    background:rgba(8,12,30,0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(120,160,255,0.3); border-radius:14px; padding:14px 16px;
    font-size:13px; line-height:1.7; display:none;
    box-shadow:0 0 40px rgba(80,140,255,0.25);
    animation:slideIn .25s ease-out;
  }
  #info-panel.show { display:block; }
  @keyframes slideIn { from {opacity:0; transform:translateX(20px);} to {opacity:1; transform:translateX(0);} }
  #info-panel h2 { margin:0 0 4px 0; font-size:18px; letter-spacing:2px; }
  #info-panel .subtitle { color:#9bd0ff; font-size:11.5px; letter-spacing:1px; margin-bottom:10px; }
  #info-panel .data-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px 10px; margin:10px 0; }
  #info-panel .data-grid .k { color:#88a; font-size:11px; }
  #info-panel .data-grid .v { font-size:12.5px; color:#fff; }
  #info-panel .fact {
    margin-top:10px; padding:9px 11px;
    background:rgba(155,208,255,0.07); border-left:3px solid #9bd0ff; border-radius:4px;
    font-size:12.5px; line-height:1.65;
  }
  #info-panel .fact b { color:#9bd0ff; }
  #info-panel .close { position:absolute; top:8px; right:12px; cursor:pointer; font-size:18px; color:#88a; }
  #info-panel .close:hover { color:#fff; }

  /* ===== 追踪徽章（含停止按钮） ===== */
  #tracking-badge {
    position:absolute; top:14px; left:50%; transform:translateX(-50%); margin-top:50px;
    padding:5px 8px 5px 14px; background:rgba(155,208,255,0.18); backdrop-filter:blur(8px);
    border:1px solid rgba(155,208,255,0.3); border-radius:16px;
    font-size:12px; color:#9bd0ff; letter-spacing:1px;
    display:none; align-items:center; gap:8px;
    transition:opacity .3s;
  }
  #tracking-badge.show { display:inline-flex; }
  #tracking-badge .stop-btn {
    background:rgba(255,100,100,0.25); border:1px solid rgba(255,120,120,0.4);
    color:#fff; border-radius:10px; padding:2px 9px; font-size:11px; cursor:pointer;
    transition:all .15s;
  }
  #tracking-badge .stop-btn:hover { background:rgba(255,100,100,0.5); }
  #tracking-badge .esc-hint { opacity:0.55; font-size:10px; }

  /* ===== 提示 ===== */
  #hint {
    position:absolute; bottom:14px; left:14px; padding:8px 12px;
    background:rgba(8,12,30,0.5); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border:1px solid rgba(120,160,255,0.18); border-radius:8px;
    font-size:11.5px; color:#aac; line-height:1.7;
  }
  #hint b { color:#9bd0ff; }

  /* 滚动条 */
  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:rgba(155,208,255,0.3); border-radius:3px; }
</style>
</head>
<body>
<div id="app"></div>

<div id="titlebar">🌌 <b>太阳系</b> 3D 探索器 · 拖拽旋转 · 滚轮缩放 · 点击星球</div>

<div id="tracking-badge">
  🔭 追踪: <span id="tracking-name">—</span>
  <button class="stop-btn" id="tracking-stop-btn">停止</button>
  <span class="esc-hint">ESC</span>
</div>

<!-- 控制面板 -->
<div id="controls">
  <h3>⚙ 控制台</h3>

  <!-- 时间流速 slider (分段: 0-50 线性 0-1×，50-100 对数 1-100×) -->
  <div class="slider-row">
    <div class="slider-head">
      <span>⏱ 时间流速</span>
      <b id="speed-label">1×</b>
    </div>
    <input type="range" id="speed-slider" min="0" max="100" value="50" step="0.5">
    <div class="speed-ticks">
      <span>暂停</span><span>慢</span><span>1×</span><span>10×</span><span>100×</span>
    </div>
  </div>

  <!-- 太阳亮度 slider (decay=0, 1.5 已足够亮，5+ 会过曝) -->
  <div class="slider-row">
    <div class="slider-head">
      <span>☀ 太阳亮度</span>
      <b id="brightness-label">1.5</b>
    </div>
    <input type="range" id="brightness-slider" min="0.5" max="8" value="1.5" step="0.1">
    <div class="speed-ticks">
      <span>暗</span><span></span><span>标准</span><span></span><span>亮</span>
    </div>
  </div>

  <label><input type="checkbox" id="toggle-orbits" checked> 显示轨道</label><br>
  <label><input type="checkbox" id="toggle-labels" checked> 显示星标</label><br>
  <label><input type="checkbox" id="toggle-stars" checked> 星空背景</label><br>
  <label><input type="checkbox" id="toggle-bloom" checked> 太阳辉光</label>
  <div style="font-size:10.5px;color:#88a;margin-top:4px;">距离按 AU 真实 · 体积真实相对</div>
</div>

<!-- 信息面板 -->
<div id="info-panel">
  <span class="close" id="info-close">✕</span>
  <h2 id="info-name">—</h2>
  <div class="subtitle" id="info-type">—</div>
  <div class="data-grid" id="info-data"></div>
  <div class="fact" id="info-fact"></div>
</div>

<!-- 图例 -->
<div id="legend">
  <h4>🪐 行星 <span style="font-size:9.5px;color:#668;font-weight:normal;">· 点击切换追踪</span></h4>
  <div id="legend-list"></div>
</div>

<div id="hint">
  <b>操作：</b> 左键拖拽旋转 · 右键平移 · 滚轮缩放 · 点击星球查看科普<br>
  <b>追踪：</b> 点击星球或图例进入追踪 · ESC 或按钮停止 · 拖拽 / 滚轮调节视角<br>
  <b>作者：</b> Hermes Agent · Three.js · 2026
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<!-- 全局错误显示 — JS 报错时显示在屏幕上方便诊断 -->
<script>
  window.addEventListener('error', (e) => {
    const err = document.createElement('div');
    err.style.cssText = 'position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); color:#f55; font-family:monospace; background:#000d; padding:24px; border-radius:8px; z-index:99999; max-width:80%; white-space:pre-wrap; border:1px solid #f55;';
    err.innerHTML = '<b>JS 错误：</b><br>' + e.message + '<br><br><b>位置：</b>' + e.filename + ':' + e.lineno + ':' + e.colno;
    document.body.appendChild(err);
  });
  window.addEventListener('unhandledrejection', (e) => {
    const err = document.createElement('div');
    err.style.cssText = 'position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); color:#f55; font-family:monospace; background:#000d; padding:24px; border-radius:8px; z-index:99999; max-width:80%; white-space:pre-wrap; border:1px solid #f55;';
    err.innerHTML = '<b>未捕获的 Promise 错误：</b><br>' + e.reason;
    document.body.appendChild(err);
  });
</script>

<script type="module" src="./src/main.js?v=20260701"></script>
</body>
</html>
